imagePullSecrets:
  - name: ghcr-secret
replicaCount: 1
image:
  repository: ghcr.io/shareify-project/shareify-notification-service
  pullPolicy: IfNotPresent
  tag: latest
service:
  type: ClusterIP
  port: 8000
persistence:
  size: 1Gi
  storageClass: "csi-standard"
  mountPath: /data
env:
  databasePath: "/data/notifications.db"
  smtpHost: "smtp.gmail.com"
  smtpPort: "587"
  smtpUser: "aknagasai2104@gmail.com"
  smtpPassword: "" # Added to fix b64enc error


